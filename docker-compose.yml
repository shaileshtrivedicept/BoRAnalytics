services:
  backend:
    build: ./bor-dashboard/backend
    ports:
      - "8000:8000"
    volumes:
      - ./bor-dashboard/backend/data_storage:/app/data_storage
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend:
    build: ./bor-dashboard/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
